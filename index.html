<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Citaro PRO Training Suite V3 - Diagnostica Certificata</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto" id="app">
        <header class="mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold text-emerald-400">Citaro PRO Training Suite V3</h1>
            <p class="text-xs text-slate-500">Diagnostica certificata: audio riprodotto solo se univoco</p>
        </header>

        <div id="game-ui" class="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <h2 id="scenario-title" class="text-xl font-bold mb-2">Caricamento...</h2>
            <p id="scenario-facts" class="text-slate-300 mb-6 text-sm"></p>
            
            <div id="audio-container" class="mb-6 space-y-4">
                <!-- Il pulsante audio verrà inserito solo se esiste un file associato -->
            </div>
            
            <div id="options" class="grid gap-3"></div>
        </div>
    </div>

    <script>
        // MAPPATURA CERTIFICATA: Solo associazioni tecnicamente corrette
        const scenarios = [
            { id: 1, name: "Pressione Olio", facts: "Spia rossa motore accesa.", correct: "Fermo", sound: "motore_rotto.mp3.mp3" },
            { id: 2, name: "Cinghia Servizi", facts: "Spia batteria e fischio acuto.", correct: "Fermo", sound: "cinghia_slitta.mp3.mp3" },
            { id: 3, name: "Scatola Sterzo", facts: "Gioco volante eccessivo.", correct: "Fermo", sound: "scatola_sterzo.mp3.mp3" },
            { id: 4, name: "Freni (Usura)", facts: "Fischio stridente in frenata.", correct: "Segnala", sound: "freni_fischio.wav.wav" },
            { id: 5, name: "Freni (Sfiato)", facts: "Rumore aria compressa.", correct: "Assistenza", sound: "freni_aria.mp3.mp3" },
            { id: 6, name: "Liquido Refrigerante", facts: "Livello minimo acqua.", correct: "Fermo", sound: null },
            { id: 7, name: "Anomalia AdBlue", facts: "Spia gialla emissioni.", correct: "Segnala", sound: null }
        ];

        let index = 0;
        const audioPlayer = new Audio();

        function playScenarioSound(fileName) {
            audioPlayer.src = fileName;
            audioPlayer.play().catch(e => console.error("Errore riproduzione:", e));
        }

        function render() {
            const s = scenarios[index];
            document.getElementById('scenario-title').innerText = s.name;
            document.getElementById('scenario-facts').innerText = s.facts;

            // Logica di esclusione rigorosa: il pulsante audio appare SOLO se s.sound esiste
            const audioContainer = document.getElementById('audio-container');
            if (s.sound) {
                audioContainer.innerHTML = `
                    <button onclick="playScenarioSound('${s.sound}')" class="bg-emerald-900 px-4 py-2 rounded border border-emerald-500 text-emerald-300 text-sm hover:bg-emerald-800">
                        🔊 Analizza Segnale Acustico Certificato
                    </button>`;
            } else {
                audioContainer.innerHTML = `
                    <div class="text-xs text-slate-500 italic p-3 bg-slate-800 rounded border border-slate-700">
                        ⚠️ Nessun segnale acustico diagnostico associato a questa anomalia.
                    </div>`;
            }

            document.getElementById('options').innerHTML = ["Fermo immediato", "Assistenza", "Segnala"].map(o => 
                `<button onclick="nextScenario()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded border border-slate-600">${o}</button>`).join('');
        }

        function nextScenario() {
            index = (index + 1) % scenarios.length;
            render();
        }

        render();
    </script>
</body>
</html>
