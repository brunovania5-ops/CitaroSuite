<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Citaro PRO Training Suite V3 - Audio Debugged</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto" id="app">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold text-emerald-400">Citaro PRO Training Suite V3</h1>
            <div id="qr-area" class="bg-white p-1 rounded"></div>
        </header>

        <div id="game-ui" class="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <h2 id="scenario-title" class="text-xl font-bold mb-2">Caricamento...</h2>
            <p id="scenario-facts" class="text-slate-300 mb-6 text-sm"></p>
            
            <div class="mb-6 space-y-4">
                <button onclick="playScenarioSound()" class="bg-emerald-900 px-4 py-2 rounded border border-emerald-500 text-emerald-300 text-sm hover:bg-emerald-800">
                    🔊 Analizza Segnale Acustico
                </button>
                <!-- Pannello Diagnostica -->
                <div id="debug-panel" class="text-xs p-3 bg-slate-800 border border-slate-700 rounded text-slate-400 font-mono">
                    Stato: In attesa di input...
                </div>
                <audio id="audio-player"></audio>
            </div>
            <div id="options" class="grid gap-3"></div>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, name: "Pressione Olio", facts: "Spia rossa, rumore metallico in galleria.", correct: "Fermo immediato", feedback: "Pressione olio 0: Rischio distruzione motore.", points: 20, sound: "motore_rotto.mp3.mp3" },
            { id: 5, name: "Sospensioni/Barra", facts: "Rumore secco su buche.", correct: "Segnala a fine turno", feedback: "Usura gommini.", points: 5, sound: "barra_stabilizzatrice.mp3.mp3" },
            { id: 6, name: "Scatola Sterzo", facts: "Gioco volante eccessivo.", correct: "Fermo immediato", feedback: "Rischio sterzo.", points: 20, sound: "scatola_sterzo.mp3.mp3" },
            { id: 7, name: "Refrigerante", facts: "Livello minimo acqua.", correct: "Fermo immediato", feedback: "Surriscaldamento.", points: 20, sound: "freni_aria.mp3.mp3" },
            { id: 9, name: "Freni", facts: "Fischio stridente in frenata.", correct: "Segnala a fine turno", feedback: "Usura pastiglie.", points: 5, sound: "freni_fischio.wav.wav" },
            { id: 10, name: "Cinghia Servizi", facts: "Spia batteria rossa, fischio acuto.", correct: "Fermo immediato", feedback: "Cinghia rotta.", points: 20, sound: "cinghia_slitta.mp3.mp3" }
        ];

        let index = 0;
        const audioPlayer = document.getElementById('audio-player');
        const debugPanel = document.getElementById('debug-panel');

        function playScenarioSound() {
            const fileName = scenarios[index].sound;
            debugPanel.innerText = "Tentativo di caricamento: " + fileName;
            
            audioPlayer.src = fileName;
            audioPlayer.play()
                .then(() => {
                    debugPanel.innerText = "Riproduzione in corso: " + fileName;
                    debugPanel.classList.add("text-emerald-400");
                })
                .catch(e => {
                    debugPanel.innerText = "ERRORE: " + e.message + ". Verifica che il file " + fileName + " sia esattamente nella cartella principale.";
                    debugPanel.classList.add("text-red-400");
                });
        }

        function render() {
            const s = scenarios[index];
            document.getElementById('scenario-title').innerText = s.name;
            document.getElementById('scenario-facts').innerText = s.facts;
            document.getElementById('options').innerHTML = ["Fermo immediato", "Assistenza", "Segnala a fine turno"].map(o => 
                `<button onclick="alert('Opzione selezionata')" class="p-3 bg-slate-800 hover:bg-slate-700 rounded border border-slate-600">${o}</button>`).join('');
        }

        render();
    </script>
</body>
</html>
